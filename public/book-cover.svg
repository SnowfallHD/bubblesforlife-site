<svg width="620" height="940" viewBox="0 0 620 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="310" y1="0" x2="310" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4CC5F7"/>
      <stop offset="0.45" stop-color="#36B8EF"/>
      <stop offset="1" stop-color="#6BD9FF"/>
    </linearGradient>
    <linearGradient id="bubbleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#DAF4FF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#8AD9FF" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#147CB5" flood-opacity="0.22"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="620" height="940" rx="36" fill="url(#sky)"/>

  <g opacity="0.6">
    <ellipse cx="540" cy="68" rx="74" ry="58" fill="#FFFFFF" fill-opacity="0.16"/>
    <ellipse cx="86" cy="874" rx="98" ry="76" fill="#FFFFFF" fill-opacity="0.18"/>
    <ellipse cx="592" cy="416" rx="52" ry="44" fill="#FFFFFF" fill-opacity="0.14"/>
    <ellipse cx="50" cy="186" rx="34" ry="20" fill="#FFFFFF" fill-opacity="0.12"/>
    <ellipse cx="120" cy="706" rx="42" ry="22" fill="#FFFFFF" fill-opacity="0.1"/>
  </g>

  <g opacity="0.74">
    <circle cx="106" cy="124" r="24" fill="url(#bubbleFill)" fill-opacity="0.75"/>
    <circle cx="490" cy="162" r="18" fill="url(#bubbleFill)" fill-opacity="0.7"/>
    <circle cx="148" cy="356" r="18" fill="url(#bubbleFill)" fill-opacity="0.72"/>
    <circle cx="530" cy="380" r="28" fill="url(#bubbleFill)" fill-opacity="0.74"/>
    <circle cx="438" cy="596" r="22" fill="url(#bubbleFill)" fill-opacity="0.76"/>
    <circle cx="170" cy="786" r="17" fill="url(#bubbleFill)" fill-opacity="0.72"/>
    <circle cx="510" cy="806" r="26" fill="url(#bubbleFill)" fill-opacity="0.74"/>
    <circle cx="328" cy="850" r="18" fill="url(#bubbleFill)" fill-opacity="0.72"/>
  </g>

  <circle cx="96" cy="770" r="90" fill="url(#bubbleFill)" fill-opacity="0.92" filter="url(#shadow)"/>

  <g filter="url(#glow)">
    <text x="310" y="260" text-anchor="middle" fill="url(#bubbleFill)" font-family="'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif" font-size="118" font-weight="700" letter-spacing="8" stroke="rgba(255,255,255,0.7)" stroke-width="4">BUBBLES</text>
    <text x="310" y="400" text-anchor="middle" fill="url(#bubbleFill)" font-family="'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif" font-size="92" font-weight="700" letter-spacing="8" stroke="rgba(255,255,255,0.7)" stroke-width="4">FOR</text>
    <text x="310" y="610" text-anchor="middle" fill="url(#bubbleFill)" font-family="'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif" font-size="156" font-weight="700" letter-spacing="10" stroke="rgba(255,255,255,0.7)" stroke-width="5">LIFE</text>
  </g>

  <g opacity="0.55">
    <circle cx="560" cy="86" r="28" fill="url(#bubbleFill)"/>
    <circle cx="388" cy="88" r="22" fill="url(#bubbleFill)"/>
    <circle cx="250" cy="84" r="15" fill="url(#bubbleFill)"/>
    <circle cx="562" cy="604" r="16" fill="url(#bubbleFill)"/>
    <circle cx="324" cy="720" r="16" fill="url(#bubbleFill)"/>
  </g>
</svg>
